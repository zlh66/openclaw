name: Build iOS App (Simulator)

on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Simulator destination'
        required: true
        default: 'platform=iOS Simulator,name=iPhone 17'
        type: string

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version
          swift --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install iOS tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Write version config
        run: bash scripts/ios-write-version-xcconfig.sh

      - name: Configure signing (simulator OK)
        env:
          IOS_SIGNING_REQUIRED: "0"
        run: |
          set +e
          bash scripts/ios-configure-signing.sh
          echo "Signing configured (or skipped for simulator)"

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Build iOS app (simulator)
        working-directory: apps/ios
        env:
          IOS_DEST: ${{ github.event.inputs.destination }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -destination "$IOS_DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate .app
        id: locate
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenClaw.app" -type d -maxdepth 5 | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS-Simulator
          path: ${{ steps.locate.outputs.app_path }}
          if-no-files-found: error
