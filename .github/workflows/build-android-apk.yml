name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_flavor:
        description: 'Build flavor'
        required: true
        default: 'thirdParty'
        type: choice
        options:
          - thirdParty
          - play
      build_type:
        description: 'Build type (debug = no signing needed, release needs signing keys)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            apps/android/**/*.gradle*
            apps/android/**/gradle-wrapper.properties
            apps/android/gradle/libs.versions.toml

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android-sdk
          key: ${{ runner.os }}-android-sdk-v1-cmdline-14742923-platform-36-build-tools-36.0.0
          restore-keys: |
            ${{ runner.os }}-android-sdk-v1-

      - name: Setup Android SDK cmdline-tools
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="14742923"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"

          if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -fsSL "$URL" -o "/tmp/${ARCHIVE}"
            rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            unzip -q "/tmp/${ARCHIVE}" -d "$ANDROID_SDK_ROOT/cmdline-tools"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build APK
        working-directory: apps/android
        env:
          FLAVOR: ${{ github.event.inputs.build_flavor }}
          TYPE: ${{ github.event.inputs.build_type }}
        run: |
          set -euo pipefail
          # Capitalize first letter of flavor and type
          FLAVOR_CAP="${FLAVOR^}"
          TYPE_CAP="${TYPE^}"
          TASK="assemble${FLAVOR_CAP}${TYPE_CAP}"
          echo "Running: ./gradlew --no-daemon --build-cache :app:${TASK}"
          ./gradlew --no-daemon --build-cache ":app:${TASK}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-${{ github.event.inputs.build_flavor }}-${{ github.event.inputs.build_type }}
          path: apps/android/app/build/outputs/apk/${{ github.event.inputs.build_flavor }}/${{ github.event.inputs.build_type }}/*.apk
          if-no-files-found: error
